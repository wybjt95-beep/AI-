services:
  - type: web
    name: ai-storyboard-assistant
    env: docker
    rootDir: "AI分镜拆解助手/网页平台"
    autoDeploy: true
    disk:
      name: ai-storyboard-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DATA_DIR
        value: /data
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_MAX_AGE_SECONDS
        value: "1209600"
      - key: APP_SECRET
        sync: false
